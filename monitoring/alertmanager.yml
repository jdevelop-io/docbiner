global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://api:8080/webhooks/alerts'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://api:8080/webhooks/alerts'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
